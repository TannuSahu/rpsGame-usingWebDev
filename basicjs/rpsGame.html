<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>R-P-S Game</title>
    <link rel="stylesheet" href="rpsGame.css">
</head>
<body>
    <h1>Rock Paper and Scissor Game</h1>
    <div class="choices">
        <div class="choice" id="rock">
            <img src="rockimg.png"/>
        </div>
        <div class="choice" id="paper">
            <img src="paperimg.png"/>
        </div>
        <div class="choice" id="scissor">
            <img src="scissorimg.png"/>
        </div>
    </div>
    <div class="score-board">
       <div class="score">
        <p id="user-score">0</p>
        <p>you</p>
       </div>
       <div class="score">
        <p id="comp-score">0</p>
        <p>comp</p>
       </div>
    </div>
    <div class="msg-container">
          <p id="msg">Play your move</p>
    </div>
     

    <script src="rpsGame.js"></script>
</body>
</html>
